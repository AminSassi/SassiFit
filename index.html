<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#F5F5F7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SassiFit" />
  <title>SassiFit</title>
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app">
    <header>
      <p class="greeting" id="greeting">Good Morning</p>
      <div class="header-row">
        <h1 class="app-title">SassiFit</h1>
        <div class="header-btns">
          <button class="icon-btn" onclick="openHistory()" aria-label="History">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          </button>
          <button class="icon-btn" onclick="openSettings()" aria-label="Settings">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </div>
    </header>

    <section class="hero" id="hero">
      <p class="hero-label">TODAY</p>
      <div id="heroProgress">
        <div class="ring-wrap">
          <svg viewBox="0 0 140 140">
            <circle cx="70" cy="70" r="62" fill="none" stroke="#E5E5EA" stroke-width="8"/>
            <circle id="ring" cx="70" cy="70" r="62" fill="none" stroke="#34C759" stroke-width="8" stroke-linecap="round" stroke-dasharray="389.6" stroke-dashoffset="389.6" transform="rotate(-90 70 70)" style="transition: stroke-dashoffset .2s ease-out"/>
          </svg>
          <span class="ring-pct" id="ringPct">0%</span>
          <span class="ring-check" id="ringCheck">✓</span>
        </div>
        <p class="hero-remaining" id="heroRemaining">28 left</p>
      </div>
      <div id="heroDone" style="display:none">
        <p class="done-title">Daily Goal Complete</p>
        <p class="done-sub">Come back tomorrow to keep<br>your streak alive.</p>
      </div>
      <div class="streak" id="streak" style="display:none">
        <span id="streakText"></span>
      </div>
    </section>

    <section class="cards" id="cards"></section>

    <section class="summary">
      <p class="summary-title">Today</p>
      <div id="summaryRows"></div>
      <div class="sum-total" id="summaryTotal"></div>
    </section>

    <section class="timeline" id="timeline"></section>

    <div aria-live="polite" aria-atomic="true" class="sr-only" id="announce"></div>
  </div>

  <div id="historyModal" class="modal" onclick="if(event.target===this)closeHistory()">
    <div class="sheet">
      <div class="handle"></div>
      <h2 class="sheet-title">History</h2>
      <div id="historyContent"></div>
      <button class="sheet-close" onclick="closeHistory()">Done</button>
    </div>
  </div>

  <div id="settingsModal" class="modal" onclick="if(event.target===this)closeSettings()">
    <div class="sheet">
      <div class="handle"></div>
      <h2 class="sheet-title">Settings</h2>
      <p class="label">Notifications</p>
      <button id="notifBtn" class="notif-btn" onclick="requestNotifications()">Enable Reminders</button>
      <p id="notifInfo" class="notif-info"></p>
      <p class="label">Daily Goal</p>
      <div class="row">
        <input id="goalInput" class="input" type="number" min="1" max="500" />
        <button class="btn-accent" onclick="saveGoal()">Save</button>
      </div>
      <p class="label">Exercises</p>
      <div class="row">
        <input id="customInput" class="input" type="text" placeholder="Add exercise" />
        <button class="btn-accent" onclick="addCustom()">Add</button>
      </div>
      <div id="customList"></div>
      <p class="label">Data</p>
      <button class="btn-outline" onclick="exportData()">Export Data</button>
      <button class="btn-outline" onclick="importData()">Import Data</button>
      <p class="label">Danger</p>
      <button class="btn-danger" onclick="resetAll()">Reset All Data</button>
      <button class="sheet-close" onclick="closeSettings()">Done</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
