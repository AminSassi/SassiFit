<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SassiFit" />
  <title>SassiFit</title>
  <link rel="icon" type="image/png" href="https://fav.farm/%F0%9F%92%AA" />
  <link rel="apple-touch-icon" href="https://fav.farm/%F0%9F%92%AA" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background: #09090b; overscroll-behavior: none; }
    .batch { width: 18px; height: 8px; border-radius: 3px; }
    .progress-bar { transition: width 0.3s ease; }
    .btn-press:active { transform: scale(0.94); }
  </style>
</head>
<body class="text-white min-h-screen">

  <div class="fixed top-0 left-0 right-0 h-1 bg-zinc-800 z-50">
    <div id="topBar" class="progress-bar h-1 bg-gradient-to-r from-emerald-500 via-blue-500 to-rose-500" style="width:0%"></div>
  </div>

  <header class="fixed top-1 left-0 right-0 z-40 flex items-center justify-between px-5 py-4">
    <span class="text-lg font-bold tracking-widest text-zinc-100">SASSIFIT</span>
    <div class="flex gap-3">
      <button onclick="openStats()" class="btn-press text-zinc-400 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      </button>
      <button onclick="openSettings()" class="btn-press text-zinc-400 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <main class="pt-20 pb-8 px-4 max-w-md mx-auto">
    <p id="dateLabel" class="text-zinc-500 text-sm mb-5 text-center"></p>
    <div id="cards" class="flex flex-col gap-4"></div>
    <button onclick="resetAll()" class="btn-press mt-6 w-full py-3 rounded-xl bg-zinc-800 text-zinc-400 text-sm font-medium hover:bg-zinc-700 transition-colors">
      Reset Day
    </button>
  </main>

  <!-- Stats modal -->
  <div id="statsModal" class="hidden fixed inset-0 z-50 bg-black/70 flex items-end justify-center" onclick="if(event.target===this)closeStats()">
    <div class="bg-zinc-900 rounded-t-2xl w-full max-w-md p-6 pb-10">
      <h2 class="text-lg font-bold mb-4 text-zinc-100">Stats</h2>
      <div id="statsContent" class="flex flex-col gap-3"></div>
      <button onclick="closeStats()" class="btn-press mt-6 w-full py-3 rounded-xl bg-zinc-800 text-zinc-400 text-sm font-medium">Close</button>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settingsModal" class="hidden fixed inset-0 z-50 bg-black/70 flex items-end justify-center" onclick="if(event.target===this)closeSettings()">
    <div class="bg-zinc-900 rounded-t-2xl w-full max-w-md p-6 pb-10">
      <h2 class="text-lg font-bold mb-4 text-zinc-100">Settings</h2>
      <div class="flex flex-col gap-5">

        <div>
          <p class="text-zinc-400 text-sm mb-2">Workout Reminders</p>
          <button onclick="requestNotifications()" id="notifBtn" class="btn-press w-full py-3 rounded-xl bg-zinc-800 text-zinc-300 text-sm font-medium hover:bg-zinc-700 transition-colors">
            Enable Notifications
          </button>
        </div>

        <div>
          <p class="text-zinc-400 text-sm mb-2">Remind me every</p>
          <div class="flex items-center gap-2">
            <input id="intervalInput" type="number" min="1" max="1440" placeholder="60"
              class="w-20 bg-zinc-800 text-white text-sm rounded-lg px-3 py-2 border border-zinc-700 focus:outline-none focus:border-zinc-500" />
            <span class="text-zinc-400 text-sm">minutes</span>
            <button onclick="saveInterval()" class="btn-press px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-500 transition-colors">Set</button>
          </div>
          <p id="intervalStatus" class="text-zinc-500 text-xs mt-1"></p>
        </div>

        <div>
          <p class="text-zinc-400 text-sm mb-2">Daily Goal per Exercise</p>
          <div class="flex items-center gap-3">
            <input id="goalInput" type="number" min="1" max="500"
              class="w-24 bg-zinc-800 text-white text-sm rounded-lg px-3 py-2 border border-zinc-700 focus:outline-none focus:border-zinc-500" />
            <button onclick="saveGoal()" class="btn-press px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-500 transition-colors">Save</button>
          </div>
        </div>

      </div>
      <button onclick="closeSettings()" class="btn-press mt-6 w-full py-3 rounded-xl bg-zinc-800 text-zinc-400 text-sm font-medium">Close</button>
    </div>
  </div>

<script>
const EXERCISES = [
  { id: 'pushups', name: 'Push-ups', bg: 'bg-emerald-500', ring: 'ring-emerald-500/30', text: 'text-emerald-400', border: 'border-emerald-500/20' },
  { id: 'situps',  name: 'Sit-ups',  bg: 'bg-rose-500',    ring: 'ring-rose-500/30',    text: 'text-rose-400',    border: 'border-rose-500/20' },
  { id: 'pullups', name: 'Pull-ups', bg: 'bg-amber-500',   ring: 'ring-amber-500/30',   text: 'text-amber-400',   border: 'border-amber-500/20' },
  { id: 'squats',  name: 'Squats',   bg: 'bg-blue-500',    ring: 'ring-blue-500/30',    text: 'text-blue-400',    border: 'border-blue-500/20' },
];

const MESSAGES = [
  "Get off the couch. Now.",
  "Your muscles are waiting. Don't keep them waiting.",
  "You said you'd work out today. Clock's ticking.",
  "No excuses. Just reps.",
  "Every rep counts. Go do them.",
  "Your future self will thank you. Or not. Your call.",
  "Time to sweat. You know what to do.",
  "The only bad workout is the one that didn't happen.",
];

const BATCH_SIZE = 10;
let reminderTimer = null;
let state = loadState();

function loadState() {
  const today = new Date().toDateString();
  const s = JSON.parse(localStorage.getItem('sassifit') || '{}');
  if (s.date !== today) {
    return { date: today, goal: s.goal || 100, reminderMins: s.reminderMins || 60, reps: { pushups: 0, situps: 0, pullups: 0, squats: 0 } };
  }
  return s;
}

function save() { localStorage.setItem('sassifit', JSON.stringify(state)); }

function addReps(id, n) {
  state.reps[id] = Math.max(0, state.reps[id] + n);
  save(); renderCard(id); updateTopBar();
}

function resetAll() {
  EXERCISES.forEach(e => state.reps[e.id] = 0);
  save(); render();
}

function updateTopBar() {
  const total = EXERCISES.reduce((s, e) => s + state.reps[e.id], 0);
  document.getElementById('topBar').style.width = Math.min(100, (total / (EXERCISES.length * state.goal)) * 100) + '%';
}

function renderCard(id) {
  const ex = EXERCISES.find(e => e.id === id);
  const reps = state.reps[id];
  const pct = Math.min(100, (reps / state.goal) * 100);
  const batches = Math.ceil(state.goal / BATCH_SIZE);
  const full = Math.floor(reps / BATCH_SIZE);
  const partial = reps % BATCH_SIZE;
  const card = document.getElementById('card-' + id);
  if (!card) return;
  card.querySelector('.rep-count').textContent = reps;
  card.querySelector('.rep-goal').textContent = '/ ' + state.goal;
  card.querySelector('.prog-bar').style.width = pct + '%';
  const row = card.querySelector('.batch-row');
  row.innerHTML = '';
  for (let i = 0; i < batches; i++) {
    const b = document.createElement('div');
    b.className = 'batch';
    if (i < full) b.classList.add(ex.bg);
    else if (i === full && partial > 0) { b.classList.add(ex.bg); b.style.opacity = (partial / BATCH_SIZE).toFixed(2); }
    else b.classList.add('bg-zinc-700');
    row.appendChild(b);
  }
}

function render() {
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  const container = document.getElementById('cards');
  container.innerHTML = '';
  EXERCISES.forEach(ex => {
    const card = document.createElement('div');
    card.id = 'card-' + ex.id;
    card.className = `rounded-2xl bg-zinc-900 border ${ex.border} p-5 ring-1 ${ex.ring}`;
    card.innerHTML = `
      <div class="flex items-center justify-between mb-3">
        <span class="font-semibold text-zinc-100 text-base">${ex.name}</span>
        <div class="flex items-baseline gap-1">
          <span class="rep-count text-2xl font-bold ${ex.text}">0</span>
          <span class="rep-goal text-zinc-500 text-sm">/ ${state.goal}</span>
        </div>
      </div>
      <div class="batch-row flex gap-1 flex-wrap mb-3"></div>
      <div class="h-1.5 bg-zinc-800 rounded-full mb-4 overflow-hidden">
        <div class="prog-bar h-1.5 ${ex.bg} rounded-full progress-bar" style="width:0%"></div>
      </div>
      <div class="flex gap-2">
        <button onclick="addReps('${ex.id}',1)"  class="btn-press flex-1 py-2.5 rounded-xl bg-zinc-800 text-zinc-300 text-sm font-medium hover:bg-zinc-700 transition-colors">+1</button>
        <button onclick="addReps('${ex.id}',5)"  class="btn-press flex-1 py-2.5 rounded-xl bg-zinc-800 text-zinc-300 text-sm font-medium hover:bg-zinc-700 transition-colors">+5</button>
        <button onclick="addReps('${ex.id}',10)" class="btn-press flex-1 py-2.5 rounded-xl ${ex.bg} text-white text-sm font-bold hover:opacity-90 transition-opacity">+10</button>
        <button onclick="addReps('${ex.id}',-1)" class="btn-press px-3 py-2.5 rounded-xl bg-zinc-800 text-zinc-500 text-sm hover:bg-zinc-700 transition-colors">−</button>
      </div>`;
    container.appendChild(card);
    renderCard(ex.id);
  });
  updateTopBar();
}

function openStats() {
  const content = document.getElementById('statsContent');
  content.innerHTML = '';
  EXERCISES.forEach(ex => {
    const reps = state.reps[ex.id];
    const pct = Math.min(100, Math.round((reps / state.goal) * 100));
    content.innerHTML += `
      <div class="flex items-center justify-between">
        <span class="text-zinc-300 text-sm">${ex.name}</span>
        <div class="flex items-center gap-3">
          <div class="w-28 h-1.5 bg-zinc-800 rounded-full overflow-hidden">
            <div class="h-1.5 ${ex.bg} rounded-full" style="width:${pct}%"></div>
          </div>
          <span class="${ex.text} text-sm font-semibold w-8 text-right">${reps}</span>
        </div>
      </div>`;
  });
  document.getElementById('statsModal').classList.remove('hidden');
}
function closeStats() { document.getElementById('statsModal').classList.add('hidden'); }

function openSettings() {
  document.getElementById('goalInput').value = state.goal;
  document.getElementById('intervalInput').value = state.reminderMins;
  document.getElementById('intervalStatus').textContent = `Currently every ${state.reminderMins} min`;
  updateNotifBtn();
  document.getElementById('settingsModal').classList.remove('hidden');
}
function closeSettings() { document.getElementById('settingsModal').classList.add('hidden'); }

function saveGoal() {
  const v = parseInt(document.getElementById('goalInput').value);
  if (v > 0) { state.goal = v; save(); render(); closeSettings(); }
}

function saveInterval() {
  const v = parseInt(document.getElementById('intervalInput').value);
  if (!v || v < 1) return;
  state.reminderMins = v;
  save();
  startReminders();
  document.getElementById('intervalStatus').textContent = `Reminder set every ${v} min`;
}

function startReminders() {
  if (reminderTimer) clearInterval(reminderTimer);
  reminderTimer = setInterval(() => {
    if (Notification.permission !== 'granted') return;
    const total = EXERCISES.reduce((s, e) => s + state.reps[e.id], 0);
    if (total < EXERCISES.length * state.goal) {
      new Notification('SassiFit', { body: MESSAGES[Math.floor(Math.random() * MESSAGES.length)] });
    }
  }, state.reminderMins * 60000);
}

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  btn.className = 'btn-press w-full py-3 rounded-xl bg-zinc-800 text-sm font-medium hover:bg-zinc-700 transition-colors';
  if (Notification.permission === 'granted') {
    btn.textContent = '✓ Notifications Enabled';
    btn.classList.add('text-emerald-400');
  } else if (Notification.permission === 'denied') {
    btn.textContent = 'Blocked — Enable in Phone Settings';
    btn.classList.add('text-rose-400');
  } else {
    btn.textContent = 'Enable Notifications';
    btn.classList.add('text-zinc-300');
  }
}

function requestNotifications() {
  if (!('Notification' in window)) { alert('Notifications not supported on this browser.'); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') {
      new Notification('SassiFit', { body: 'Reminders on. No more excuses.' });
      startReminders();
    }
    updateNotifBtn();
  });
}

render();
updateNotifBtn();
startReminders();
</script>
</body>
</html>
