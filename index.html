<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SassiFit" />
  <title>SassiFit</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>💪</text></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>💪</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="text-white min-h-screen">

  <div class="fixed top-0 left-0 right-0 h-1 bg-zinc-800 z-50">
    <div id="topBar" class="progress-bar h-1 bg-gradient-to-r from-emerald-500 via-blue-500 to-rose-500" style="width:0%"></div>
  </div>

  <header class="fixed top-1 left-0 right-0 z-40 flex items-center justify-between px-5 py-4">
    <span class="text-lg font-bold tracking-widest text-zinc-100">SASSIFIT</span>
    <div class="flex gap-3">
      <button onclick="openStats()" class="btn-press text-zinc-400 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      </button>
      <button onclick="openSettings()" class="btn-press text-zinc-400 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <main class="pt-20 pb-8 px-4 max-w-md mx-auto">
    <p id="dateLabel" class="text-zinc-500 text-sm mb-5 text-center"></p>
    <div id="cards" class="flex flex-col gap-4"></div>
    <button onclick="resetAll()" class="btn-press mt-6 w-full py-3 rounded-xl bg-zinc-800 text-zinc-400 text-sm font-medium hover:bg-zinc-700 transition-colors">
      Reset Day
    </button>
  </main>

  <!-- Stats modal -->
  <div id="statsModal" class="hidden fixed inset-0 z-50 bg-black/70 flex items-end justify-center" onclick="if(event.target===this)closeStats()">
    <div class="bg-zinc-900 rounded-t-2xl w-full max-w-md p-6 pb-10">
      <h2 class="text-lg font-bold mb-4 text-zinc-100">Stats</h2>
      <div id="statsContent" class="flex flex-col gap-3"></div>
      <button onclick="closeStats()" class="btn-press mt-6 w-full py-3 rounded-xl bg-zinc-800 text-zinc-400 text-sm font-medium">Close</button>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settingsModal" class="hidden fixed inset-0 z-50 bg-black/70 flex items-end justify-center" onclick="if(event.target===this)closeSettings()">
    <div class="bg-zinc-900 rounded-t-2xl w-full max-w-md p-6 pb-10">
      <h2 class="text-lg font-bold mb-4 text-zinc-100">Settings</h2>
      <div class="flex flex-col gap-5">

        <div>
          <p class="text-zinc-400 text-sm mb-2">Workout Reminders</p>
          <button onclick="requestNotifications()" id="notifBtn" class="btn-press w-full py-3 rounded-xl bg-zinc-800 text-zinc-300 text-sm font-medium hover:bg-zinc-700 transition-colors">
            Enable Notifications
          </button>
        </div>

        <div>
          <p class="text-zinc-400 text-sm mb-2">Remind me every</p>
          <div class="flex items-center gap-2">
            <input id="intervalInput" type="number" min="1" max="1440" placeholder="60"
              class="w-20 bg-zinc-800 text-white text-sm rounded-lg px-3 py-2 border border-zinc-700 focus:outline-none focus:border-zinc-500" />
            <span class="text-zinc-400 text-sm">minutes</span>
            <button onclick="saveInterval()" class="btn-press px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-500 transition-colors">Set</button>
          </div>
          <p id="intervalStatus" class="text-zinc-500 text-xs mt-1"></p>
        </div>

        <div>
          <p class="text-zinc-400 text-sm mb-2">Daily Goal per Exercise</p>
          <div class="flex items-center gap-3">
            <input id="goalInput" type="number" min="1" max="500"
              class="w-24 bg-zinc-800 text-white text-sm rounded-lg px-3 py-2 border border-zinc-700 focus:outline-none focus:border-zinc-500" />
            <button onclick="saveGoal()" class="btn-press px-4 py-2 rounded-lg bg-emerald-600 text-white text-sm font-medium hover:bg-emerald-500 transition-colors">Save</button>
          </div>
        </div>

      </div>
      <button onclick="closeSettings()" class="btn-press mt-6 w-full py-3 rounded-xl bg-zinc-800 text-zinc-400 text-sm font-medium">Close</button>
    </div>
  </div>

  <script src="js/app.js" type="module"></script>
</body>
</html>
